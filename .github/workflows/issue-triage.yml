name: Issue Triage

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run issue triage
        run: |
          python -m oss_maintainer_copilot.cli triage-issue \
            --input "$GITHUB_EVENT_PATH" \
            --output triage.json \
            --markdown triage.md

      - name: Apply labels and update triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const triage = JSON.parse(fs.readFileSync("triage.json", "utf8"));
            const triageBody = fs.readFileSync("triage.md", "utf8");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const labels = triage.recommended_labels || [];
            const marker = "<!-- oss-maintainer-copilot:issue-triage -->";
            const labelPalette = {
              "difficulty:beginner": { color: "0e8a16", description: "Suitable for a beginner contributor" },
              "difficulty:intermediate": { color: "fbca04", description: "Requires moderate project knowledge" },
              "difficulty:advanced": { color: "d93f0b", description: "Requires advanced project knowledge" },
              "difficulty:maintainer_only": { color: "5319e7", description: "Needs maintainer judgment or ownership" },
              "triage:category:bug": { color: "d73a4a", description: "Classified as a bug report" },
              "triage:category:docs": { color: "0075ca", description: "Classified as a documentation request" },
              "triage:category:feature_request": { color: "a2eeef", description: "Classified as a feature request" },
              "triage:category:refactor": { color: "cfd3d7", description: "Classified as a refactor request" },
              "triage:category:ambiguous": { color: "f9d0c4", description: "Needs clearer issue framing" },
              "triage:good-first-issue": { color: "1d76db", description: "Candidate for a good first issue review" },
              "triage:missing-context": { color: "b60205", description: "Needs additional maintainer or reporter context" }
            };

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (error) {
                if (error.status === 404) {
                  const defaults = labelPalette[label] || {
                    color: "ededed",
                    description: "Automation label created by OSS Maintainer Copilot"
                  };
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label,
                    color: defaults.color,
                    description: defaults.description
                  });
                } else {
                  throw error;
                }
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels
              });
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: triageBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: triageBody
              });
            }
