name: PR Summary

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build PR summary input
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100
            });

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100
            });

            const payload = {
              pull_request: context.payload.pull_request,
              repository: context.payload.repository,
              changed_file_paths: files.map((file) => file.filename),
              commit_messages: commits.map((commit) => commit.commit.message.split("\n")[0])
            };

            fs.writeFileSync("pr-input.json", JSON.stringify(payload, null, 2));

      - name: Run PR summarizer
        run: |
          python -m oss_maintainer_copilot.cli summarize-pr \
            --input pr-input.json \
            --output pr-summary.json \
            --markdown pr-summary.md

      - name: Post or update PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const summaryBody = fs.readFileSync("pr-summary.md", "utf8");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.pull_request.number;
            const marker = "<!-- oss-maintainer-copilot:pr-summary -->";

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: summaryBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: summaryBody
              });
            }

